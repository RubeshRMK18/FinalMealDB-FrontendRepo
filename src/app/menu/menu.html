<div class="container">
  <h1>🍽️ Meal Manager</h1>

  <!-- Search by ID -->
  <div class="search-box">
    <input type="number" [(ngModel)]="searchId" placeholder="Enter Meal ID" />
    <button (click)="search()">Search</button>
  </div>

  <!-- Search Result -->
  <div class="result-card" *ngIf="selectedMeal">
    <h3>Search Result</h3>
    <p><strong>ID:</strong> {{selectedMeal.id }}</p>
    <p><strong>Name:</strong> {{ selectedMeal.name }}</p>
    <p><strong>Price:</strong> ₹{{ selectedMeal.price }}</p>
  
  </div>
  <div class="form-card">
  <h2>Add New Meal</h2>
  <div class="form-group">
  <label>ID</label>
  <input type="number" [(ngModel)]="newmeal.id" placeholder="Meal ID" />
</div>
  <div class="form-group">
    <label>Name</label>
    <input type="text" [(ngModel)]="newmeal.name" placeholder="Meal name" />
  </div>
  <div class="form-group">
    <label>Price (₹)</label>
    <input type="number" [(ngModel)]="newmeal.price" placeholder="Price" />
  </div>
  <button class="btn-save" (click)="createMeal()">Save Meal</button>
  <table>
    <thead>
      <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let meal of menu ">
        <td>{{ meal.id }}</td>
        <td>{{ meal.name }}</td>
        <td>₹{{ meal.price }}</td>
      </tr>
      <tr *ngIf="menu.length === 0">
        <td colspan="5" class="empty">No meals found.</td>
      </tr>
    </tbody>
  </table>
</div>
